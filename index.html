        body {

            padding: 20px;
            background: #f5f5f5;
        }
        .product {
            background: white;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            display: block;
        }
        .product .caption {
            padding: 15px;
            font-size: 18px;
            text-align: center;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .footer {
