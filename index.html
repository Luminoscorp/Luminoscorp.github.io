<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的企业官网</title>
    <!-- 引用 CSS 样式文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 导航栏 -->
    <nav>
        <div class="logo">Luminos company</div>
        <div class="nav-links">
            <a href="#">服务</a>
            <a href="#">流程</a>
            <a href="#">关于</a>
        </div>
        <a href="#" class="btn-primary">联系我们</a>
    </nav>

    <!-- 主体内容区 -->
    <main>
        <!-- 首屏区域（Hero Section） -->
        <section id="hero">
            <!-- 背景装饰元素（如渐变、网格） -->
            <div class="hero-bg"></div>
            <div class="hero-grid"></div>

            <div class="hero-content">
                <div class="hero-badge">✨ 专业.可靠</div>
                <h1 class="hero-title">
                    打造专业的<br>
                    <em>服务体验</em>
                </h1>
                <p class="hero-sub">我们帮助像您一样的企业，通过前沿的设计与技术，在数字化浪潮中脱颖而出。</p>
                <div class="hero-actions">
                    <a href="#" class="btn-primary">开始旅程</a>
                    <a href="#" class="btn-secondary">了解我们</a>
                </div>
                <div class="hero-stats">
                    <div class="stat">
                        <div class="stat-num"><span>500+</span></div>
                        <div class="stat-label">成功案例</div>
                    </div>
                    <div class="stat">
                        <div class="stat-num"><span>98%</span></div>
                        <div class="stat-label">客户满意</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 服务区域 -->
        <section id="services">
            <div class="section-inner">
                <div class="section-label">我们的服务</div>
                <h2 class="section-title">一站式解决方案</h2>
                <div class="services-grid">
                    <!-- 服务卡片 1 -->公司注册</h3>
                    <div class="service-card">
                        <div class="service-icon">🚀</div>
                        <h3 class="service-name">银行账户</h3>
                        <p class="service-desc">从0到1构建品牌核心价值...</p>
                    </div>
                    <!-- 更多卡片（2-3个）... -->会计服务</h3>
                                                         </div>
                                                         </div>
        </section>
    </main>
    <!-- 后续章节（流程、评价等）和页脚类似，暂略 -->
</body>
</html>
