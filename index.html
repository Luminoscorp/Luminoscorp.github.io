<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的产品展示</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .product {
            background: white;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            display: block;
        }
        .product .caption {
            padding: 15px;
            font-size: 18px;
            text-align: center;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>✨ 我的产品展示 ✨</h1>

    <!-- 这里每增加一个产品，就复制下面一整段（从 <div class="product"> 到 </div>） -->
    <!-- 把 src="你的图片文件名.jpg" 里的文件名改成你实际图片的名字 -->
    
    <div class="product">
        <img src="MKF JPG (2).jpg" alt="产品图片1">
        <div class="caption">产品名称 1</div>
    </div>

    <div class="product">
        <img src="MKF JPG (3).jpg" alt="产品图片2">
        <div class="caption">产品名称 2</div>
    </div>

  </div> <div class="product">

    </div>

   </div> <div class="product">

   </div> <div class="product">
        <img src="eac36caeffeb1da5ce9cdcdd5cfbe405.jpg" alt="产品图片2">

</html>
